<!DOCTYPE html>
<html>
<head>
    <title>My Simple Website</title>

    <style>
        body {
            font-family: Arial;
            background-color: black;
            background-repeat: no-repeat;
        }

        header {
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background-color: rgba(0, 0, 0, 0.7);
            text-align: center;
            padding: 10px;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        section {
            background-color:lightsalmon;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
        }

        footer {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>My Website</h1>
    <p>Welcome to my page</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<section>
    <h2>About Me</h2>
    <p>This is a simple website with a background image.</p>
</section>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
